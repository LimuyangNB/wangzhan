<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI内容创作工具-手机端</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei";}
        :root {
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --bg-btn-secondary: #fff;
            --bg-primary-light: #e8edff;
            --bg-vip-light: #fff8f0;
            --border: #e5e7eb;
            --text-main: #333333;
            --text-secondary: #6b7280;
            --text-gray: #9ca3af;
            --text-white: #ffffff;
            --text-vip: #ff9500;
            --primary: #4299e1;
            --vip-color: #ff9500;
        }

        .theme-black {--primary: #1f2937; --bg-primary-light: #e5e7eb; --text-main: #fff; --bg-main: #111827; --bg-card: #1f2937; --bg-btn-secondary: #374151; --border: #374151; --text-secondary: #d1d5db; --text-gray: #9ca3af;}
        .theme-white {--primary: #6b7280; --bg-primary-light: #f3f4f6; --text-main: #111827; --bg-main: #ffffff; --bg-card: #f9fafb; --border: #e5e7eb;}
        .theme-lightblue {--primary: #4299e1; --bg-primary-light: #e8edff;}
        .theme-red {--primary: #ef4444; --bg-primary-light: #fee2e2;}
        .theme-lightcyan {--primary: #06b6d4; --bg-primary-light: #e0f2fe;}

        body {background: var(--bg-main); min-height: 100vh; padding-bottom: 80px; transition: all 0.3s ease; color: var(--text-main);}
        .header {background: var(--primary); color: var(--text-white); padding: 15px 20px; text-align: center; font-size: 18px; font-weight: 600; position: fixed; top: 0; left: 0; right: 0; z-index: 99; transition: background 0.3s ease;}
        .container {margin-top: 60px; padding: 15px;}

        .user-setting {display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 10px;}
        .user-info {display: flex; align-items: center; gap: 8px; color: var(--text-secondary);}
        .logout-btn {background: none; border: none; color: var(--primary); cursor: pointer; font-size: 14px; padding: 2px 4px;}
        .theme-set {display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--primary); font-size: 14px;}
        .theme-icon {font-size: 16px;}

        .tab-bar {display: flex; background: var(--bg-card); border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border);}
        .tab-item {flex: 1; text-align: center; padding: 12px 0; font-size: 16px; color: var(--text-main); border: none; background: none; cursor: pointer; transition: all 0.2s ease;}
        .tab-item.active {background: var(--primary); color: var(--text-white);}

        .input-box {background: var(--bg-card); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border);}
        .result-box {background: var(--bg-card); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border);}
        .form-item {margin-bottom: 12px;}
        .form-item label {font-size: 14px; color: var(--text-secondary); margin-bottom: 5px; display: block;}
        .form-item input, .form-item select, .form-item textarea {width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; resize: none; background: var(--bg-card); color: var(--text-main); transition: all 0.2s ease;}
        .form-item textarea {min-height: 100px;}
        .form-item input:focus, .form-item select:focus, .form-item textarea:focus {outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--bg-primary-light);}

        .btn-group {display: flex; gap: 10px; margin-bottom: 15px;}
        .btn {flex: 1; padding: 12px 0; border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s ease;}
        .btn-primary {background: var(--primary); color: var(--text-white);}
        .btn-primary:hover {opacity: 0.9;}
        .btn-secondary {background: var(--bg-btn-secondary); color: var(--primary); border: 1px solid var(--primary);}
        .btn-secondary:hover {background: var(--bg-primary-light);}

        .result-title {font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; display: flex; justify-content: space-between;}
        .result-content {font-size: 15px; color: var(--text-main); line-height: 1.6; min-height: 80px; white-space: pre-wrap;}
        .ai-tag {font-size: 12px; color: var(--text-gray); margin-top: 10px; text-align: right;}

        .count-tip {font-size: 14px; text-align: center; margin-bottom: 10px; padding: 8px 0; border-radius: 6px;}
        .count-tip.default {color: var(--text-secondary); background: #fee2e2; border: 1px solid #fecdd3;}
        .count-tip.vip {color: var(--primary); background: var(--bg-primary-light); border: 1px solid var(--bg-primary-light);}

        .history-list {background: var(--bg-card); border-radius: 8px; padding: 10px; border: 1px solid var(--border);}
        .history-item {padding: 10px; border-bottom: 1px solid var(--border);}
        .history-item:last-child {border: none;}
        .history-time {font-size: 12px; color: var(--text-gray); margin-bottom: 5px;}
        .history-prompt {font-size: 14px; color: var(--text-secondary); margin-bottom: 5px;}
        .history-content {font-size: 14px; color: var(--text-main); line-height: 1.5;}

        .footer-vip {position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); padding: 10px 15px; border-top: 1px solid var(--border); text-align: center; transition: all 0.3s ease;}
        .vip-btn {background: var(--vip-color); color: var(--text-white); border: none; padding: 10px 30px; border-radius: 20px; font-size: 16px; cursor: pointer; transition: all 0.2s ease;}
        .vip-btn:hover {opacity: 0.9;}

        .hide {display: none !important;}

        .vip-modal {position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: flex; align-items: center; justify-content: center;}
        .vip-modal-content {width: 90%; max-width: 400px; background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border);}
        .vip-modal-title {font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 20px; color: var(--primary);}
        .vip-package-list {margin-bottom: 20px;}
        .vip-package-item {border: 2px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s ease;}
        .vip-package-item.active {border-color: var(--vip-color); background: var(--bg-vip-light);}
        .package-name {font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 5px;}
        .package-price {font-size: 20px; color: var(--text-vip); font-weight: 700;}
        .package-desc {font-size: 12px; color: var(--text-gray); margin-top: 5px;}
        .vip-pay-btn {width: 100%; background: var(--vip-color); color: var(--text-white); border: none; padding: 15px 0; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; margin-bottom: 10px;}
        .vip-close-btn {width: 100%; background: var(--bg-btn-secondary); color: var(--text-secondary); border: 1px solid var(--border); padding: 10px 0; border-radius: 8px; font-size: 16px; cursor: pointer;}
        .vip-status {font-size: 14px; color: var(--text-secondary); text-align: center; margin-top: 10px;}

        .auth-modal {position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;}
        .auth-modal-content {width: 90%; max-width: 400px; background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border);}
        .auth-tabs {display: flex; margin-bottom: 20px;}
        .auth-tab {flex: 1; text-align: center; padding: 10px 0; font-size: 16px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s ease;}
        .auth-tab.active {color: var(--primary); border-bottom: 2px solid var(--primary);}
        .auth-form {display: none;}
        .auth-form.active {display: block;}
        .auth-btn {width: 100%; background: var(--primary); color: var(--text-white); border: none; padding: 12px 0; border-radius: 8px; font-size: 16px; margin-top: 10px; cursor: pointer;}
        .auth-status {font-size: 14px; color: #ef4444; text-align: center; margin-top: 10px;}

        .theme-modal {position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1001; display: flex; align-items: center; justify-content: center;}
        .theme-modal-content {width: 90%; max-width: 380px; background: var(--bg-card); border-radius: 12px; padding: 25px 20px; border: 1px solid var(--border);}
        .theme-modal-title {font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 20px; text-align: center;}
        .theme-custom {display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border);}
        .theme-custom label {font-size: 14px; color: var(--text-secondary);}
        .color-picker {width: 40px; height: 40px; border: none; border-radius: 50%; cursor: pointer; background: transparent;}
        .color-picker::-webkit-color-swatch-wrapper {padding: 0;}
        .color-picker::-webkit-color-swatch {border: 2px solid var(--border); border-radius: 50%;}
        .theme-preset {margin-bottom: 20px;}
        .theme-preset-title {font-size: 14px; color: var(--text-secondary); margin-bottom: 15px;}
        .theme-list {display: flex; flex-wrap: wrap; justify-content: space-around; gap: 12px;}
        .theme-item {width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 3px solid var(--border); transition: all 0.2s ease;}
        .theme-item.active {border-color: var(--primary); box-shadow: 0 0 0 2px var(--bg-primary-light);}
        .theme-black-item {background: #1f2937;}
        .theme-white-item {background: #6b7280;}
        .theme-lightblue-item {background: #4299e1;}
        .theme-red-item {background: #ef4444;}
        .theme-lightcyan-item {background: #06b6d4;}
        .theme-confirm-btn {width: 100%; background: var(--primary); color: var(--text-white); border: none; padding: 12px 0; border-radius: 8px; font-size: 16px; cursor: pointer;}

        .log-export-btn {
            position: fixed;
            bottom: 80px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--text-white);
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 80;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .log-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .log-modal-content {
            width: 90%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .log-modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-close-btn {
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 20px;
            cursor: pointer;
        }
        .log-content {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            white-space: pre-wrap;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .log-export-action {
            display: flex;
            gap: 10px;
        }
        .log-export-action button {
            flex: 1;
            padding: 10px 0;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .log-clear-btn {
            background: #ef4444;
            color: white;
        }
        .log-save-btn {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body id="appBody" class="theme-lightblue">
    <div class="header">AI内容创作工具</div>

    <div class="container">
        <div class="user-setting hide" id="userSetting">
            <div class="user-info">
                欢迎，<span id="username"></span>
                <button class="logout-btn" id="logoutBtn">退出</button>
            </div>
            <div class="theme-set" id="themeSet">
                <span class="theme-icon">🎨</span>
                <span>主题设置</span>
            </div>
        </div>

        <div class="count-tip default hide" id="countTip">今日免费生成次数：3次</div>
        <div class="count-tip vip hide" id="vipStatusTip">✅ 当前为月会员，有效期至2026-12-31，无限制生成</div>

        <div class="tab-bar hide" id="mainTabBar">
            <button class="tab-item active" data-tab="shortVideo">短/长视频创作</button>
            <button class="tab-item" data-tab="office">办公创作</button>
            <button class="tab-item" data-tab="history">历史记录</button>
        </div>

        <div class="tab-content hide" id="shortVideo">
            <div class="input-box">
                <div class="form-item">
                    <label>发布平台</label>
                    <select id="svPlatform">
                        <option value="抖音">抖音</option>
                        <option value="小红书">小红书</option>
                        <option value="视频号">视频号</option>
                        <option value="bilibili">bilibili</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>内容调性</label>
                    <select id="svTone">
                        <option value="带货">带货</option>
                        <option value="干货">干货</option>
                        <option value="搞笑">搞笑</option>
                        <option value="情感">情感</option>

                    </select>

                    <textarea id="svPrompt" placeholder="请输入你的创作需求..."></textarea>

            </div>
            <div class="result-box">
                <div class="result-title">生成结果</div>
                <div class="result-content" id="svResult"></div>

                <button class="btn btn-secondary" style="width:100%; margin-top:10px;" id="svCopy">复制内容</button>

        </div>

        <div class="tab-content hide" id="office">
            <div class="input-box">
                <div class="form-item">
                    <label>内容调性</label>
                    <select id="ofTone">
                        <option value="正式">正式</option>
                        <option value="简洁">简洁</option>
                        <option value="商务">商务</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>输入创作需求（如：运营周报、工作汇报、商务邮件）</label>
                    <textarea id="ofPrompt" placeholder="请输入你的创作需求..."></textarea>

            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="ofVoice">语音输入</button>
                <button class="btn btn-primary" id="ofCreate">一键生成</button>

            <div class="result-box">
                <div class="result-title">生成结果</div>

        <div class="tab-content hide" id="history">

            </div>

    </div>

    <div class="footer-vip hide" id="footerVip">
        <button class="vip-btn" id="vipBtn">开通会员 | 无限制生成</button>
    </div>

    <div class="vip-modal hide" id="vipModal">
        <div class="vip-modal-content">

        <div class="auth-modal-content">

            </div>

                <div class="form-item">
                    <label>用户名</label>

                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-item">

    <div class="theme-modal hide" id="themeModal">
        <div class="theme-modal-content">
            <div class="theme-modal-title">自定义主题色</div>

            <div class="theme-preset">
                <div class="theme-preset-title">预设颜色（点击选择）</div>
                <div class="theme-list">
                    <div class="theme-item theme-black-item" data-theme="theme-black" title="黑色"></div>
                    <div class="theme-item theme-white-item" data-theme="theme-white" title="白色"></div>
                    <div class="theme-item theme-lightblue-item active" data-theme="theme-lightblue" title="浅蓝"></div>
                    <div class="theme-item theme-red-item" data-theme="theme-red" title="红色"></div>
                    <div class="theme-item theme-lightcyan-item" data-theme="theme-lightcyan" title="淡青色"></div>

            <div class="log-export-action">
                <button class="log-clear-btn" id="logClearBtn">清空日志</button>
                <button class="log-save-btn" id="logSaveBtn">导出日志</button>
            </div>
        </div>
    </div>

    <button class="log-export-btn hide" id="logExportBtn">📝</button>

    <script>
        // 日志工具类
        class ClientLogger {
            constructor() {
                this.LOG_STORAGE_KEY = 'ai_creator_client_logs';
                this.MAX_LOG_COUNT = 1000;
                this.logs = this.loadLogs();
            }

            loadLogs() {
                try {
                    const logsStr = localStorage.getItem(this.LOG_STORAGE_KEY);
                    return logsStr ? JSON.parse(logsStr) : [];
                } catch (e) {
                    console.error('加载日志失败：', e);
                    return [];
                }
            }

            saveLogs() {
                try {
                    if (this.logs.length > this.MAX_LOG_COUNT) {
                        this.logs = this.logs.slice(-this.MAX_LOG_COUNT);
                    }
                    localStorage.setItem(this.LOG_STORAGE_KEY, JSON.stringify(this.logs));
                } catch (e) {
                    console.error('保存日志失败：', e);
                }
            }

            getTimestamp() {
                const now = new Date();
                return now.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }

            log(level, module, message, data = null) {
                const logItem = {
                    time: this.getTimestamp(),
                    level: level,
                    module: module,
                    message: message,
                    data: data
                };
                
                this.logs.push(logItem);
                this.saveLogs();
                
                const logStr = `[${logItem.time}] [${level}] [${module}] ${message}`;
                switch (level) {
                    case 'ERROR':
                        console.error(logStr, data || '');
                        break;
                    case 'WARN':
                        console.warn(logStr, data || '');
                        break;
                    default:
                        console.log(logStr, data || '');
                }
            }

            info(module, message, data = null) {
                this.log('INFO', module, message, data);
            }

            warn(module, message, data = null) {
                this.log('WARN', module, message, data);
            }

            error(module, message, data = null) {
                this.log('ERROR', module, message, data);
            }

            getFormattedLogs() {
                return this.logs.map(item => {
                    let dataStr = item.data ? JSON.stringify(item.data, null, 2) : '';
                    return `[${item.time}] [${item.level}] [${item.module}] ${item.message} ${dataStr}`;
                }).join('\n');
            }

            clearLogs() {
                this.logs = [];
                localStorage.removeItem(this.LOG_STORAGE_KEY);
                this.info('日志工具', '日志已清空');
            }

            exportLogs() {
                const logText = this.getFormattedLogs();
                const blob = new Blob([logText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `ai_creator_client_${new Date().getTime()}.log`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.info('日志工具', '日志导出成功');
            }
        }

        // 绑定语音输入事件
        function bindVoiceEvent() {
            // 检查浏览器是否支持语音识别
            const isSupportSpeech = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            
            const bindVoice = (btnId, inputId) => {
                const btn = document.getElementById(btnId);
                const input = document.getElementById(inputId);
                
                if (!btn || !input) return;
                
                if (!isSupportSpeech) {
                    btn.innerText = "语音输入(不支持)";
                    btn.disabled = true;
                    logger.warn('语音输入', '浏览器不支持语音识别');
                    return;
                }
                
                btn.onclick = function() {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const recognition = new SpeechRecognition();
                    
                    recognition.lang = 'zh-CN';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;
                    
                    btn.innerText = "正在倾听...";
                    btn.disabled = true;
                    logger.info('语音输入', '开始语音识别');
                    
                    recognition.onresult = function(event) {
                        const transcript = event.results[0][0].transcript;
                        input.value = transcript;
                        logger.info('语音输入', '语音识别成功', { transcript });
                    };
                    
                    recognition.onend = function() {
                        btn.innerText = "语音输入";
                        btn.disabled = false;
                    };
                    
                    recognition.onerror = function(event) {
                        alert(`语音识别错误: ${event.error}`);
                        btn.innerText = "语音输入";
                        btn.disabled = false;
                        logger.error('语音输入', '语音识别错误', event.error);
                    };
                    
                    recognition.start();
                };
            };
            
            bindVoice("svVoice", "svPrompt");
            bindVoice("ofVoice", "ofPrompt");
        }

        // 绑定复制按钮事件
        function bindCopyEvent() {
            const copyToClipboard = (text, btn) => {
                if (!navigator.clipboard) {
                    // 降级方案
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        alert("复制成功！");
                        logger.info('内容复制', '使用降级方案复制成功');
                    } catch (err) {
                        alert("复制失败，请手动复制");
                        logger.error('内容复制', '降级方案复制失败', err);
                    }
                    document.body.removeChild(textArea);
                    return;
                }
                
                navigator.clipboard.writeText(text).then(() => {
                    alert("复制成功！");
                    logger.info('内容复制', '复制成功');
                }).catch(err => {
                    alert("复制失败，请手动复制");
                    logger.error('内容复制', '复制失败', err);
                });
            };
            
            // 短视频复制
            const svCopy = document.getElementById("svCopy");
            if (svCopy) {
                svCopy.onclick = function() {
                    const content = document.getElementById("svResult")?.innerText;
                    if (!content || content === "AI正在思考中...") {
                        alert("暂无可复制的内容！");
                        return;
                    }
                    copyToClipboard(content, this);
                };
            }
            
            // 办公内容复制
            const ofCopy = document.getElementById("ofCopy");
            if (ofCopy) {
                ofCopy.onclick = function() {
                    const content = document.getElementById("ofResult")?.innerText;
                    if (!content || content === "AI正在思考中...") {
                        alert("暂无可复制的内容！");
                        return;
                    }
                    copyToClipboard(content, this);
                };
            }
        }

                            })
                        });
                        
                        const result = await response.json();
                        
                        if (result.code === 200) {
                            if (vipPayStatus) vipPayStatus.innerText = "支付成功！VIP已开通";
                            isVip = true;
                            userInfo.is_vip = true;
                            localStorage.setItem("ai_creator_user", JSON.stringify(userInfo));
                            
                            // 更新UI
                            const countTip = document.getElementById("countTip");
                            const vipStatusTip = document.getElementById("vipStatusTip");
                            if (countTip) countTip.classList.add("hide");
                            if (vipStatusTip) vipStatusTip.classList.remove("hide");
                            
                            setTimeout(() => {
                                const vipModal = document.getElementById("vipModal");
                                if (vipModal) vipModal.classList.add("hide");
                            }, 2000);
                            
                            logger.info('VIP功能', 'VIP购买成功', { package_id: selectedPackageId });
                        } else {
                            if (vipPayStatus) vipStatusTip.innerText = result.msg || "支付失败";
                            logger.error('VIP功能', 'VIP购买失败', result);
                        }
                    } catch (e) {
                        if (vipPayStatus) vipPayStatus.innerText = "网络错误，请重试";
                        logger.error('VIP功能', 'VIP购买请求异常', e);
                    }
                };
            }
        }

        // 绑定关闭按钮事件
        function bindCloseBtnEvent() {
            // VIP弹窗关闭
            const vipCloseBtn = document.getElementById("vipCloseBtn");
            if (vipCloseBtn) {
                vipCloseBtn.onclick = function() {
                    const vipModal = document.getElementById("vipModal");
                    if (vipModal) vipModal.classList.add("hide");
                    logger.info('弹窗操作', '关闭VIP弹窗');
                };
            }
            
            // 日志弹窗关闭
            const logCloseBtn = document.getElementById("logCloseBtn");
            if (logCloseBtn) {
                logCloseBtn.onclick = function() {
                    const logModal = document.getElementById("logModal");
                    if (logModal) logModal.classList.add("hide");
                    logger.info('弹窗操作', '关闭日志弹窗');
                };
            }
        }

        // 绑定主题设置事件
        function bindThemeEvent() {
            // 打开主题设置
            const themeSet = document.getElementById("themeSet");
            if (themeSet) {
                themeSet.onclick = function() {
                    const themeModal = document.getElementById("themeModal");
                    if (themeModal) themeModal.classList.remove("hide");
                    logger.info('主题设置', '打开主题设置弹窗');
                };
            }
            
            // 预设主题选择
            const themeItems = document.querySelectorAll(".theme-item");
            if (themeItems) {
                themeItems.forEach(item => {
                    item.onclick = function() {
                        themeItems.forEach(i => i.classList.remove("active"));
                        this.classList.add("active");
                        selectedTheme = this.dataset.theme;
                        logger.info('主题设置', `选择预设主题: ${selectedTheme}`);
                    };
                });
            }
            
            // 颜色选择器
            const colorPicker = document.getElementById("colorPicker");
            if (colorPicker) {
                colorPicker.oninput = function() {
                    customPrimaryColor = this.value;
                    applyTheme(selectedTheme, customPrimaryColor);
                    logger.info('主题设置', `选择自定义颜色: ${customPrimaryColor}`);
                };
            }
            
            // 确认应用主题
            const themeConfirmBtn = document.getElementById("themeConfirmBtn");
            if (themeConfirmBtn) {
                themeConfirmBtn.onclick = function() {
                    saveTheme(selectedTheme, customPrimaryColor);
                    const themeModal = document.getElementById("themeModal");
                    if (themeModal) themeModal.classList.add("hide");
                    logger.info('主题设置', '应用主题成功');
                };
            }
        }

        // 绑定日志相关事件
        function bindLogEvents() {
            // 打开日志弹窗
            const logExportBtn = document.getElementById("logExportBtn");
            if (logExportBtn) {
                logExportBtn.onclick = function() {
                    const logModal = document.getElementById("logModal");
                    const logContent = document.getElementById("logContent");
                    if (logContent) logContent.innerText = logger.getFormattedLogs();
                    if (logModal) logModal.classList.remove("hide");
                    logger.info('日志操作', '打开日志弹窗');
                };
            }
            
            // 清空日志
            const logClearBtn = document.getElementById("logClearBtn");
            if (logClearBtn) {
                logClearBtn.onclick = function() {
                    if (confirm("确定要清空日志吗？")) {
                        logger.clearLogs();
                        const logContent = document.getElementById("logContent");
                        if (logContent) logContent.innerText = "";
                        logger.info('日志操作', '清空日志');
                    }
                };
            }
            
            // 导出日志
            const logSaveBtn = document.getElementById("logSaveBtn");
            if (logSaveBtn) {
                logSaveBtn.onclick = function() {
                    logger.exportLogs();
                    logger.info('日志操作', '导出日志');
                };
            }
        }

        // 获取用户信息
        async function getUserInfo() {
            try {
                const response = await fetch(`${SERVER_URL}/api/user/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userInfo.user_id })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    userInfo = result.data;
                    isVip = userInfo.is_vip || false;
                    localStorage.setItem("ai_creator_user", JSON.stringify(userInfo));
                    
                    // 更新VIP状态显示
                    const countTip = document.getElementById("countTip");
                    const vipStatusTip = document.getElementById("vipStatusTip");
                    if (isVip) {
                        if (countTip) countTip.classList.add("hide");
                        if (vipStatusTip) vipStatusTip.classList.remove("hide");
                    }
                    
                    logger.info('用户信息', '获取用户信息成功', { is_vip: isVip });
                }
            } catch (e) {
                logger.error('用户信息', '获取用户信息失败', e);
            }
        }

        // 获取VIP套餐
        async function getVipPackages() {
            try {
                const response = await fetch(`${SERVER_URL}/api/vip/packages`);
                const result = await response.json();
                
                if (result.code === 200) {
                    const packages = result.data;
                    const packageList = document.getElementById("vipPackageList");
                    
                    if (packageList) {
                        packageList.innerHTML = "";
                        packages.forEach(pkg => {
                            const item = document.createElement("div");
                            item.className = `vip-package-item ${pkg.id === 1 ? 'active' : ''}`;
                            item.dataset.packageId = pkg.id;
                            item.innerHTML = `
                                <div class="package-name">${pkg.name}</div>
                                <div class="package-price">¥${pkg.price}</div>
                                <div class="package-desc">${pkg.description}</div>
                            `;
                            packageList.appendChild(item);
                        });
                    }
                    
                    logger.info('VIP功能', '获取VIP套餐成功', { count: packages.length });
                }
            } catch (e) {
                logger.error('VIP功能', '获取VIP套餐失败', e);
            }
        }

        // 保存历史记录
        function saveHistory(historyItem) {
            try {
                const HISTORY_KEY = `ai_creator_history_${userInfo.user_id}`;
                let histories = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
                
                histories.unshift(historyItem);
                // 最多保存100条
                if (histories.length > 100) histories = histories.slice(0, 100);
                
                localStorage.setItem(HISTORY_KEY, JSON.stringify(histories));
                logger.info('历史记录', '保存历史记录成功');
            } catch (e) {
                logger.error('历史记录', '保存历史记录失败', e);
            }
        }

        // 加载历史记录
        function loadHistory() {
            try {
                const HISTORY_KEY = `ai_creator_history_${userInfo.user_id}`;
                const histories = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
                const historyList = document.getElementById("historyList");
                
                if (!historyList) return;
                
                if (histories.length === 0) {
                    historyList.innerHTML = '<div style="text-align:center; color:var(--text-gray); padding:20px 0;">暂无生成记录，快去创作吧~</div>';
                    return;
                }
                
                historyList.innerHTML = "";
                histories.forEach((item, index) => {
                    const timeStr = new Date(item.create_time).toLocaleString();
                    const typeName = item.type === "short_video" ? "短视频创作" : "办公创作";
                    
                    const historyItem = document.createElement("div");
                    historyItem.className = "history-item";
                    historyItem.innerHTML = `
                        <div class="history-time">${timeStr} · ${typeName}</div>
                        <div class="history-prompt">需求：${item.prompt}</div>
                        <div class="history-content">${item.content.substring(0, 100)}${item.content.length > 100 ? '...' : ''}</div>
                    `;
                    historyList.appendChild(historyItem);
                });
                
                logger.info('历史记录', `加载${histories.length}条历史记录`);
            } catch (e) {
                logger.error('历史记录', '加载历史记录失败', e);
            }
        }

        // 全局错误捕获
        window.onerror = function(message, source, lineno, colno, error) {
            logger.error('全局错误', message, { source, lineno, colno, error });
            return true;
        };
    </script>
</body>
