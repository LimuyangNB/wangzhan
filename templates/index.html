<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI创作助手</title>
    <style>
        :root {
            --primary: #4096ff;
            --primary-light: #69b1ff;
            --primary-dark: #1d73d8;
            --success: #52c41a;
            --warning: #faad14;
            --error: #ff4d4f;
            --text-main: #333;
            --text-gray: #666;
            --text-light: #999;
            --bg-main: #fff;
            --bg-gray: #f5f5f5;
            --bg-light: #fafafa;
            --border: #e5e5e5;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --primary: #54a0ff;
            --primary-light: #78b9ff;
            --primary-dark: #2e86de;
            --text-main: #e5e5e5;
            --text-gray: #b3b3b3;
            --text-light: #808080;
            --bg-main: #1a1a1a;
            --bg-gray: #262626;
            --bg-light: #333;
            --border: #404040;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 28px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vip-tag {
            background-color: var(--warning);
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-light);
        }

        .btn-primary:active {
            background-color: var(--primary-dark);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background-color: var(--primary-light);
            color: white;
        }

        .btn-text {
            background-color: transparent;
            color: var(--primary);
        }

        .btn-text:hover {
            background-color: var(--bg-light);
        }

        .card {
            background-color: var(--bg-main);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(64, 150, 255, 0.2);
        }

        .select-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-size: 14px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .col-8 {
            grid-column: span 8;
        }

        .col-4 {
            grid-column: span 4;
        }

        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .tab-item {
            padding: 8px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-item.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }

        .tab-item:hover {
            color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .result-box {
            width: 100%;
            min-height: 200px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            background-color: var(--bg-light);
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 16px;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .history-prompt {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .history-content {
            font-size: 14px;
            color: var(--text-gray);
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            width: 400px;
            background-color: var(--bg-main);
            border-radius: 8px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            cursor: pointer;
            font-size: 20px;
            color: var(--text-light);
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 16px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .auth-tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }

        .auth-content {
            display: none;
        }

        .auth-content.active {
            display: block;
        }

        .status-text {
            font-size: 12px;
            margin-top: 8px;
            height: 16px;
            line-height: 16px;
        }

        .status-error {
            color: var(--error);
        }

        .status-success {
            color: var(--success);
        }

        .hide {
            display: none !important;
        }

        .vip-package-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }

        .vip-package-item {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vip-package-item.active {
            border-color: var(--primary);
            background-color: rgba(64, 150, 255, 0.1);
        }

        .vip-package-item:hover {
            border-color: var(--primary-light);
        }

        .package-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .package-price {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .package-desc {
            font-size: 12px;
            color: var(--text-gray);
        }

        .logger-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 999;
        }

        .logger-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 400px;
            height: 300px;
            background-color: var(--bg-main);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 12px;
            overflow-y: auto;
            z-index: 999;
            display: none;
        }

        .logger-panel.show {
            display: block;
        }

        .logger-item {
            font-size: 12px;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .logger-time {
            color: var(--text-light);
        }

        .logger-type {
            display: inline-block;
            padding: 0 4px;
            border-radius: 2px;
            margin: 0 4px;
            font-size: 10px;
        }

        .logger-type-info {
            background-color: #e6f4ff;
            color: #1890ff;
        }

        .logger-type-error {
            background-color: #fff2f0;
            color: #ff4d4f;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .col-8, .col-4 {
                grid-column: span 12;
            }

            .modal-content {
                width: 90%;
            }

            .logger-panel {
                width: 90%;
            }
        }
    </style>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>AI创作助手</span>
            </div>
            <div class="header-right">
                <div class="user-info hide" id="userInfo">
                    <span id="username"></span>
                    <span class="vip-tag hide" id="vipTag">VIP</span>
                </div>
                <button class="btn btn-outline" id="loginBtn" onclick="showAuthModal('login')">登录</button>
                <button class="btn btn-primary hide" id="logoutBtn">退出登录</button>
                <button class="btn btn-text" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="btn btn-outline" id="vipBtn">开通会员</button>
            </div>
        </header>

        <!-- 未登录提示 -->
        <div id="unloginTip" class="card">
            <div style="text-align: center; padding: 40px 0;">
                <i class="fas fa-lock" style="font-size: 48px; color: var(--text-light); margin-bottom: 16px;"></i>
                <h3>请先登录后使用</h3>
                <p style="color: var(--text-gray); margin: 8px 0 16px;">登录后可使用AI创作、保存历史记录等功能</p>
                <button class="btn btn-primary" onclick="showAuthModal('login')">立即登录</button>
            </div>
        </div>

        <!-- 主内容区（登录后显示） -->
        <div id="mainContent" class="hide">
            <div class="grid">
                <!-- 创作区 -->
                <div class="col-8">
                    <div class="card">
                        <div class="card-header">AI创作</div>
                        <div class="tab-header">
                            <div class="tab-item active" data-tab="shortVideo">短视频创作</div>
                            <div class="tab-item" data-tab="office">办公创作</div>
                        </div>
                        <!-- 短视频创作 -->
                        <div class="tab-content active" id="shortVideoTab">
                            <div class="form-item">
                                <label class="form-label">平台选择</label>
                                <select class="select-control" id="svPlatform">
                                    <option value="douyin">抖音</option>
                                    <option value="kuaishou">快手</option>
                                    <option value="video号">视频号</option>
                                    <option value="小红书">小红书</option>
                                </select>
                            </div>
                            <div class="form-item">
                                <label class="form-label">创作风格</label>
                                <select class="select-control" id="svTone">
                                    <option value="humorous">幽默搞笑</option>
                                    <option value="emotional">情感共鸣</option>
                                    <option value="knowledge">知识科普</option>
                                    <option value="marketing">带货营销</option>
                                    <option value="daily">日常记录</option>
                                </select>
                            </div>
                            <div class="form-item">
                                <label class="form-label">创作需求</label>
                                <textarea class="form-control" id="svPrompt" rows="4" placeholder="请输入您的创作需求，例如：生成一个关于春季护肤的短视频文案..."></textarea>
                            </div>
                            <button class="btn btn-primary" id="svCreate">
                                <i class="fas fa-magic"></i> 生成内容
                            </button>
                            <div class="result-box" id="svResult"></div>
                        </div>
                        <!-- 办公创作 -->
                        <div class="tab-content" id="officeTab">
                            <div class="form-item">
                                <label class="form-label">创作风格</label>
                                <select class="select-control" id="ofTone">
                                    <option value="formal">正式严谨</option>
                                    <option value="simple">简洁明了</option>
                                    <option value="persuasive">说服性强</option>
                                    <option value="creative">创意新颖</option>
                                </select>
                            </div>
                            <div class="form-item">
                                <label class="form-label">创作需求</label>
                                <textarea class="form-control" id="ofPrompt" rows="4" placeholder="请输入您的创作需求，例如：写一篇产品推广的邮件..."></textarea>
                            </div>
                            <button class="btn btn-primary" id="ofCreate">
                                <i class="fas fa-magic"></i> 生成内容
                            </button>
                            <div class="result-box" id="ofResult"></div>
                        </div>
                    </div>
                </div>

                <!-- 侧边栏 -->
                <div class="col-4">
                    <!-- 历史记录 -->
                    <div class="card">
                        <div class="card-header">
                            <span>创作历史</span>
                            <button class="btn btn-text" style="float: right; padding: 0;" id="refreshHistory">
                                <i class="fas fa-refresh"></i> 刷新
                            </button>
                        </div>
                        <div id="historyList">
                            <div style="text-align:center; color:var(--text-gray); padding:20px 0;">暂无生成记录，快去创作吧~</div>
                        </div>
                    </div>

                    <!-- 会员提示 -->
                    <div class="card">
                        <div class="card-header">会员特权</div>
                        <div style="padding: 16px 0;">
                            <ul style="padding-left: 20px; color: var(--text-gray); line-height: 1.8;">
                                <li>无限制创作次数</li>
                                <li>更多创作风格选择</li>
                                <li>更长的创作内容</li>
                                <li>优先使用新功能</li>
                            </ul>
                            <button class="btn btn-primary" style="width: 100%; margin-top: 16px;" id="openVipBtn">立即开通</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录/注册弹窗 -->
    <div class="modal hide" id="authModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>用户登录</span>
                <span class="close-btn" onclick="hideAuthModal()">&times;</span>
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active" data-auth-tab="login" onclick="switchAuthTab('login')">登录</div>
                <div class="auth-tab" data-auth-tab="register" onclick="switchAuthTab('register')">注册</div>
            </div>
            <!-- 登录表单 -->
            <div class="auth-content active" id="loginForm">
                <div class="form-item">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn btn-primary" style="width: 100%;" id="loginSubmit">登录</button>
                <div class="status-text" id="loginStatus"></div>
            </div>
            <!-- 注册表单 -->
            <div class="auth-content" id="registerForm">
                <div class="form-item">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-item">
                    <label class="form-label">手机号（选填）</label>
                    <input type="tel" class="form-control" id="regPhone" placeholder="请输入手机号">
                </div>
                <button class="btn btn-primary" style="width: 100%;" id="registerSubmit">注册</button>
                <div class="status-text" id="registerStatus"></div>
            </div>
        </div>
    </div>

    <!-- 会员开通弹窗 -->
    <div class="modal hide" id="vipModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>开通会员</span>
                <span class="close-btn" onclick="hideVipModal()">&times;</span>
            </div>
            <div class="vip-package-list" id="vipPackageList">
                <!-- 会员套餐会通过JS动态加载 -->
            </div>
            <button class="btn btn-primary" style="width: 100%;" id="vipPayBtn">立即支付</button>
            <div class="status-text" id="vipPayStatus"></div>
        </div>
    </div>

    <!-- 日志按钮和面板 -->
    <div class="logger-btn" id="loggerBtn">
        <i class="fas fa-file-alt"></i>
    </div>
    <div class="logger-panel" id="loggerPanel"></div>

    <script>
        // 全局变量
        let userInfo = null;
        let isVip = false;
        let selectedPackageId = '';
        const logger = new (class ClientLogger {
            constructor() {
                this.logs = [];
                this.panel = document.getElementById('loggerPanel');
                this.btn = document.getElementById('loggerBtn');
                
                this.btn.addEventListener('click', () => {
                    this.panel.classList.toggle('show');
                });
            }

            log(type, module, message, data = null) {
                const logItem = {
                    time: new Date().toLocaleString(),
                    type,
                    module,
                    message,
                    data
                };
                this.logs.unshift(logItem);
                
                // 限制日志数量
                if (this.logs.length > 100) {
                    this.logs.pop();
                }
                
                // 更新日志面板
                this.renderLogs();
                
                // 控制台输出
                const logFunc = type === 'error' ? console.error : console.log;
                logFunc(`[${logItem.time}] [${type}] [${module}]`, message, data || '');
            }

            info(module, message, data = null) {
                this.log('info', module, message, data);
            }

            error(module, message, data = null) {
                this.log('error', module, message, data);
            }

            renderLogs() {
                this.panel.innerHTML = '';
                this.logs.forEach(item => {
                    const logEl = document.createElement('div');
                    logEl.className = 'logger-item';
                    
                    let typeClass = 'logger-type-info';
                    let typeText = 'INFO';
                    if (item.type === 'error') {
                        typeClass = 'logger-type-error';
                        typeText = 'ERROR';
                    }
                    
                    logEl.innerHTML = `
                        <span class="logger-time">${item.time}</span>
                        <span class="logger-type ${typeClass}">${typeText}</span>
                        <span class="logger-module">[${item.module}]</span>
                        <span class="logger-message">${item.message}</span>
                        ${item.data ? `<div class="logger-data">${JSON.stringify(item.data)}</div>` : ''}
                    `;
                    
                    this.panel.appendChild(logEl);
                });
            }
        })();

        // API客户端
        const apiClient = new (class ApiClient {
            constructor(baseUrl) {
                this.baseUrl = baseUrl;
                this.logger = logger;
            }

            async request(options) {
                const { url, method = 'GET', data = {}, headers = {} } = options;
                let fullUrl = `${this.baseUrl}${url}`;

                try {
                    this.logger.info('ApiClient', `发起${method}请求`, { url: fullUrl, data });
                    
                    const defaultHeaders = {
                        'Content-Type': 'application/json',
                        'Authorization': userInfo ? `Bearer ${userInfo.token}` : ''
                    };

                    const fetchOptions = {
                        method,
                        headers: { ...defaultHeaders, ...headers },
                    };

                    if (method.toUpperCase() !== 'GET') {
                        fetchOptions.body = JSON.stringify(data);
                    } else {
                        const params = new URLSearchParams(data);
                        fullUrl += `?${params.toString()}`;
                    }

                    const response = await fetch(fullUrl, fetchOptions);
                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.message || `请求失败：${response.status}`);
                    }

                    this.logger.info('ApiClient', `请求成功`, { url: fullUrl, result });
                    return result;

                } catch (error) {
                    this.logger.error('ApiClient', `请求失败`, { url: fullUrl, error: error.message });
                    throw error;
                }
            }

            get(url, data = {}) {
                return this.request({ url, method: 'GET', data });
            }

            post(url, data = {}) {
                return this.request({ url, method: 'POST', data });
            }

            put(url, data = {}) {
                return this.request({ url, method: 'PUT', data });
            }

            delete(url, data = {}) {
                return this.request({ url, method: 'DELETE', data });
            }
        })('https://wangzhan-production.up.railway.app');

        // 初始化函数
        function init() {
            logger.info('Init', '应用初始化开始');
            
            // 检查本地存储的用户信息
            checkLoginStatus();
            
            // 绑定事件
            bindEvents();
            
            // 加载主题
            loadTheme();
            
            logger.info('Init', '应用初始化完成');
        }

        // 检查登录状态
        function checkLoginStatus() {
            const savedUser = localStorage.getItem('ai_creator_user');
            if (savedUser) {
                try {
                    userInfo = JSON.parse(savedUser);
                    isVip = userInfo.is_vip || false;
                    showMainUI();
                    loadHistory();
                    logger.info('Auth', '自动登录成功', userInfo);
                } catch (error) {
                    logger.error('Auth', '解析用户信息失败', error);
                    localStorage.removeItem('ai_creator_user');
                    showUnloginUI();
                }
            } else {
                showUnloginUI();
            }
        }

        // 显示未登录界面
        function showUnloginUI() {
            document.getElementById('unloginTip').classList.remove('hide');
            document.getElementById('mainContent').classList.add('hide');
            document.getElementById('loginBtn').classList.remove('hide');
            document.getElementById('logoutBtn').classList.add('hide');
            document.getElementById('userInfo').classList.add('hide');
        }

        // 显示主界面
        function showMainUI() {
            document.getElementById('unloginTip').classList.add('hide');
            document.getElementById('mainContent').classList.remove('hide');
            document.getElementById('loginBtn').classList.add('hide');
            document.getElementById('logoutBtn').classList.remove('hide');
            document.getElementById('userInfo').classList.remove('hide');
            
            // 更新用户信息
            document.getElementById('username').textContent = userInfo.username;
            if (isVip) {
                document.getElementById('vipTag').classList.remove('hide');
            } else {
                document.getElementById('vipTag').classList.add('hide');
            }
        }

        // 绑定所有事件
        function bindEvents() {
            // 标签切换
            bindTabEvents();
            
            // 认证相关
            bindAuthEvents();
            
            // 创作相关
            bindCreateEvents();
            
            // 历史记录
            bindHistoryEvents();
            
            // 会员相关
            bindVipEvents();
            
            // 主题切换
            bindThemeEvent();
            
            // 退出登录
            document.getElementById('logoutBtn').addEventListener('click', logout);
        }

        // 标签切换事件
        function bindTabEvents() {
            const tabItems = document.querySelectorAll('.tab-item');
            tabItems.forEach(item => {
                item.addEventListener('click', () => {
                    // 移除所有激活状态
                    tabItems.forEach(i => i.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    // 添加当前激活状态
                    item.classList.add('active');
                    const tabId = item.dataset.tab + 'Tab';
                    document.getElementById(tabId).classList.add('active');
                });
            });
        }

        // 认证相关事件
        function bindAuthEvents() {
            // 登录提交
            document.getElementById('loginSubmit').addEventListener('click', async () => {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                
                if (!username || !password) {
                    document.getElementById('loginStatus').textContent = '用户名和密码不能为空';
                    document.getElementById('loginStatus').className = 'status-text status-error';
                    return;
                }
                
                try {
                    const result = await apiClient.post('/api/login', {
                        username,
                        password
                    });
                    
                    if (result.code === 200) {
                        userInfo = result.data;
                        isVip = userInfo.is_vip || false;
                        localStorage.setItem('ai_creator_user', JSON.stringify(userInfo));
                        
                        document.getElementById('loginStatus').textContent = '登录成功';
                        document.getElementById('loginStatus').className = 'status-text status-success';
                        
                        // 隐藏弹窗，显示主界面
                        setTimeout(() => {
                            hideAuthModal();
                            showMainUI();
                        }, 1000);
                    } else {
                        throw new Error(result.message || '登录失败');
                    }
                } catch (error) {
                    document.getElementById('loginStatus').textContent = error.message;
                    document.getElementById('loginStatus').className = 'status-text status-error';
                    logger.error('Auth', '登录失败', error);
                }
            });

            // 注册提交
            document.getElementById('registerSubmit').addEventListener('click', async () => {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                
                if (!username || !password) {
                    document.getElementById('registerStatus').textContent = '用户名和密码不能为空';
                    document.getElementById('registerStatus').className = 'status-text status-error';
                    return;
                }
                
                try {
                    const result = await apiClient.post('/api/register', {
                        username,
                        password,
                        phone
                    });
                    
                    if (result.code === 200) {
                        document.getElementById('registerStatus').textContent = '注册成功，请登录';
                        document.getElementById('registerStatus').className = 'status-text status-success';
                        
                        // 切换到登录标签
                        setTimeout(() => {
                            switchAuthTab('login');
                        }, 1500);
                    } else {
                        throw new Error(result.message || '注册失败');
                    }
                } catch (error) {
                    document.getElementById('registerStatus').textContent = error.message;
                    document.getElementById('registerStatus').className = 'status-text status-error';
                    logger.error('Auth', '注册失败', error);
                }
            });
        }

        // 创作相关事件
        function bindCreateEvents() {
            // 短视频生成
            document.getElementById('svCreate').addEventListener('click', async () => {
                const platform = document.getElementById('svPlatform').value;
                const tone = document.getElementById('svTone').value;
                const prompt = document.getElementById('svPrompt').value.trim();
                
                if (!prompt) {
                    alert('请输入创作需求');
                    return;
                }
                
                const resultEl = document.getElementById('svResult');
                resultEl.textContent = '正在生成...';
                
                try {
                    const result = await apiClient.post('/api/ai_create', {
                        user_id: userInfo.user_id,
                        type: 'short_video',
                        platform,
                        tone,
                        prompt
                    });
                    
                    if (result.code === 200) {
                        resultEl.textContent = result.data.content;
                        saveHistory('shortVideo', prompt, result.data.content);
                    } else {
                        throw new Error(result.message || '生成失败');
                    }
                } catch (error) {
                    resultEl.textContent = `生成失败：${error.message}`;
                    logger.error('Create', '短视频生成失败', error);
                }
            });

            // 办公内容生成
            document.getElementById('ofCreate').addEventListener('click', async () => {
                const tone = document.getElementById('ofTone').value;
                const prompt = document.getElementById('ofPrompt').value.trim();
                
                if (!prompt) {
                    alert('请输入创作需求');
                    return;
                }
                
                const resultEl = document.getElementById('ofResult');
                resultEl.textContent = '正在生成...';
                
                try {
                    const result = await apiClient.post('/api/ai_create', {
                        user_id: userInfo.user_id,
                        type: 'office',
                        tone,
                        prompt
                    });
                    
                    if (result.code === 200) {
                        resultEl.textContent = result.data.content;
                        saveHistory('office', prompt, result.data.content);
                    } else {
                        throw new Error(result.message || '生成失败');
                    }
                } catch (error) {
                    resultEl.textContent = `生成失败：${error.message}`;
                    logger.error('Create', '办公内容生成失败', error);
                }
            });
        }

        // 历史记录相关事件
        function bindHistoryEvents() {
            document.getElementById('refreshHistory').addEventListener('click', loadHistory);
        }

        // 会员相关事件
        function bindVipEvents() {
            // 开通会员按钮
            document.getElementById('vipBtn').addEventListener('click', showVipModal);
            document.getElementById('openVipBtn').addEventListener('click', showVipModal);
            
            // 支付按钮
            document.getElementById('vipPayBtn').addEventListener('click', async () => {
                if (!selectedPackageId) {
                    document.getElementById('vipPayStatus').textContent = '请选择会员套餐';
                    document.getElementById('vipPayStatus').className = 'status-text status-error';
                    return;
                }
                
                try {
                    const result = await apiClient.post('/api/create_vip_order', {
                        user_id: userInfo.user_id,
                        package_id: selectedPackageId
                    });
                    
                    if (result.code === 200) {
                        // 跳转到支付页面
                        window.location.href = result.data.pay_url;
                    } else {
                        throw new Error(result.message || '创建订单失败');
                    }
                } catch (error) {
                    document.getElementById('vipPayStatus').textContent = error.message;
                    document.getElementById('vipPayStatus').className = 'status-text status-error';
                    logger.error('VIP', '支付失败', error);
                }
            });
        }

        // 主题切换事件
        function bindThemeEvent() {
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', toggleTheme);
        }

        // 加载主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // 更新图标
            updateThemeIcon(savedTheme);
        }

        // 切换主题
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // 更新图标
            updateThemeIcon(newTheme);
            
            logger.info('Theme', `切换到${newTheme}主题`);
        }

        // 更新主题图标
        function updateThemeIcon(theme) {
            const icon = document.querySelector('#themeToggle i');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        // 显示认证弹窗
        function showAuthModal(type = 'login') {
            document.getElementById('authModal').classList.remove('hide');
            switchAuthTab(type);
            
            // 清空状态
            document.getElementById('loginStatus').textContent = '';
            document.getElementById('registerStatus').textContent = '';
        }

        // 隐藏认证弹窗
        function hideAuthModal() {
            document.getElementById('authModal').classList.add('hide');
        }

        // 切换认证标签
        function switchAuthTab(type) {
            const tabs = document.querySelectorAll('.auth-tab');
            const contents = document.querySelectorAll('.auth-content');
            
            tabs.forEach(tab => {
                if (tab.dataset.authTab === type) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            contents.forEach(content => {
                if (content.id === `${type}Form`) {
                    content.classList.add('active');
                } else {
                    content.classList.remove('active');
                }
            });
            
            // 更新标题
            document.querySelector('.modal-header span:first-child').textContent = 
                type === 'login' ? '用户登录' : '用户注册';
        }

        // 显示会员弹窗
        async function showVipModal() {
            document.getElementById('vipModal').classList.remove('hide');
            document.getElementById('vipPayStatus').textContent = '';
            
            // 加载会员套餐
            await loadVipPackages();
        }

        // 隐藏会员弹窗
        function hideVipModal() {
            document.getElementById('vipModal').classList.add('hide');
        }

        // 加载会员套餐
        async function loadVipPackages() {
            try {
                const result = await apiClient.get('/api/get_vip_packages');
                
                if (result.code === 200 && result.data.length > 0) {
                    const packageList = document.getElementById('vipPackageList');
                    packageList.innerHTML = '';
                    
                    result.data.forEach((pkg, index) => {
                        const pkgEl = document.createElement('div');
                        pkgEl.className = `vip-package-item ${index === 0 ? 'active' : ''}`;
                        pkgEl.dataset.packageId = pkg.id;
                        pkgEl.innerHTML = `
                            <div class="package-name">${pkg.name}</div>
                            <div class="package-price">¥${pkg.price}/${pkg.cycle}</div>
                            <div class="package-desc">${pkg.desc}</div>
                        `;
                        
                        pkgEl.addEventListener('click', () => {
                            document.querySelectorAll('.vip-package-item').forEach(i => i.classList.remove('active'));
                            pkgEl.classList.add('active');
                            selectedPackageId = pkg.id;
                        });
                        
                        packageList.appendChild(pkgEl);
                    });
                    
                    // 默认选中第一个
                    selectedPackageId = result.data[0].id;
                }
            } catch (error) {
                logger.error('VIP', '加载套餐失败', error);
                document.getElementById('vipPackageList').innerHTML = `
                    <div style="text-align:center; color:var(--error); padding:20px 0;">
                        加载套餐失败：${error.message}
                    </div>
                `;
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('ai_creator_user');
            userInfo = null;
            isVip = false;
            showUnloginUI();
            logger.info('Auth', '退出登录成功');
        }

        // 保存历史记录
        async function saveHistory(type, prompt, content) {
            try {
                await apiClient.post('/api/get_history', {
                    user_id: userInfo.user_id,
                    type,
                    prompt,
                    content,
                    create_time: new Date().getTime()
                });
                
                // 刷新历史记录
                loadHistory();
            } catch (error) {
                logger.error('History', '保存失败', error);
            }
        }

        // 加载历史记录
        async function loadHistory() {
            try {
                const result = await apiClient.get('/api/get_history', {
                    user_id: userInfo.user_id
                });
                
                if (result.code === 200 && result.data.length > 0) {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = '';
                    
                    result.data.forEach(item => {
                        const timeStr = new Date(item.create_time).toLocaleString();
                        const typeText = item.type === 'shortVideo' ? '短视频' : '办公内容';
                        
                        const historyItem = document.createElement('div');
                        historyItem.className = 'history-item';
                        historyItem.innerHTML = `
                            <div class="history-time">${timeStr} · ${typeText}</div>
                            <div class="history-prompt">${item.prompt}</div>
                            <div class="history-content">${item.content}</div>
                        `;
                        
                        historyList.appendChild(historyItem);
                    });
                } else {
                    document.getElementById('historyList').innerHTML = `
                        <div style="text-align:center; color:var(--text-gray); padding:20px 0;">
                            暂无生成记录，快去创作吧~
                        </div>
                    `;
                }
            } catch (error) {
                logger.error('History', '加载失败', error);
                document.getElementById('historyList').innerHTML = `
                    <div style="text-align:center; color:var(--error); padding:20px 0;">
                        加载历史失败：${error.message}
                    </div>
                `;
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);

        // 全局错误捕获
        window.addEventListener('error', (event) => {
            logger.error('Global', '页面错误', {
                message: event.message,
                filename: event.filename,
                lineno: event.lineno,
                colno: event.colno,
                error: event.error
            });
        });

        // 全局Promise错误捕获
        window.addEventListener('unhandledrejection', (event) => {
            logger.error('Global', 'Promise错误', event.reason);
        });
    </script>
</body>
</html>
